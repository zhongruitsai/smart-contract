name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: /smart-contract
          NEXT_PUBLIC_CHAIN_ID: "11155111"
          NEXT_PUBLIC_GOVERNANCE_TOKEN: "0xF66eDC30ad91A267969FE6b7A43B926dAE6FDEdC"
          NEXT_PUBLIC_GOVERNANCE_VOTING: "0xf80cb19e8E8d575356F6CD1F720701e6BEaB1b09"
          NEXT_PUBLIC_DIRECTOR_ELECTION: "0xA681948EF87c82132695eFD62fea99eCA6f589b6"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
