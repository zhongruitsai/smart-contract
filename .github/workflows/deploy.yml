name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: /smart-contract
          NEXT_PUBLIC_CHAIN_ID: "11155111"
          NEXT_PUBLIC_GOVERNANCE_TOKEN: "0x5b6481D78ca124FD52Bb0BDEe81248C63e46dC7E"
          NEXT_PUBLIC_GOVERNANCE_VOTING: "0xCa987CaaCC53aD5e2dF551Dc6BA5Cb6D747DFDd5"
          NEXT_PUBLIC_DIRECTOR_ELECTION: "0xFAD1Cf05bbf46A85c7368F28d585aE2069622dd6"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
