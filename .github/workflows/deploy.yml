name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: /smart-contract
          NEXT_PUBLIC_CHAIN_ID: ${{ vars.CHAIN_ID }}
          NEXT_PUBLIC_GOVERNANCE_TOKEN: ${{ vars.GOVERNANCE_TOKEN }}
          NEXT_PUBLIC_GOVERNANCE_VOTING: ${{ vars.GOVERNANCE_VOTING }}
          NEXT_PUBLIC_DIRECTOR_ELECTION: ${{ vars.DIRECTOR_ELECTION }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
