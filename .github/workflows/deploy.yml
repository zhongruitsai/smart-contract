name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: /smart-contract
          NEXT_PUBLIC_CHAIN_ID: "11155111"
          NEXT_PUBLIC_GOVERNANCE_TOKEN: "0xF9174f94d91cBdb968d5F48a28Fb98a917E2C041"
          NEXT_PUBLIC_GOVERNANCE_VOTING: "0xEb7f94cC456053E9592b8859b336F525a31FB613"
          NEXT_PUBLIC_DIRECTOR_ELECTION: "0xADc8bd38fDc405E09B01Fe2888479B78aEa588fB"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
