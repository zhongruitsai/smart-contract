name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: /smart-contract
          NEXT_PUBLIC_CHAIN_ID: "11155111"
          NEXT_PUBLIC_GOVERNANCE_TOKEN: "0x32a113f43ba7fe93d8b261f9b29a806dbc0958cb"
          NEXT_PUBLIC_GOVERNANCE_VOTING: "0x14003e4ad7a04255f6a26d67227415224270832c"
          NEXT_PUBLIC_DIRECTOR_ELECTION: "0x37ae1715d55f5fdb22a73869c21a5300965db093"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
